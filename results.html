<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./assets/reset.css" />
    <link rel="stylesheet" href="./assets/normalize.css" />
    <link rel="stylesheet" href="./assets/results.css" />
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/images/Poké_Ball_icon.svg.png"
    />
    <title>Build Week 1 Team 5</title>
  </head>
  <body>
    <header>
      <img id="logo" src="./assets/images/epicode_logo.png" alt="logo-page" />
    </header>
    <main>
      <div id="title-page">
        <h2>Results</h2>
        <p>The summary of your answers:</p>
      </div>
      <div id="results-group">
        <div id="correct-left">
          <h2>Correct</h2>
          <div class="percentage cyan-text" id="correct-percent">0%</div>
          <p id="correct-count">0/0 questions</p>
        </div>
        <div id="center-results">
          <div class="donut-chart" id="donut-chart">
            <div class="chart-center"></div>
          </div>
        </div>
        <div id="wrong-right">
          <h2 class="wrong-title">Wrong</h2>
          <div class="percentage magenta-text" id="wrong-percent">0%</div>
          <p id="wrong-count">0/0 questions</p>
        </div>
      </div>
      <div id="position-btn">
        <button id="rate-us" type="submit">RATE US</button>
      </div>
      <div id="results-answer">
        <ul class="results-questions"></ul>
      </div>
    </main>
    <footer></footer>
    <script src="./scripts/results.js"></script>
  </body>
</html>
