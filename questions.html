<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Benchmark</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="icon"
      type="image/x-icon"
      href="./assets/Poké_Ball_icon.svg.png"
    />
    <link rel="stylesheet" href="/assets/reset.css" />
    <link rel="stylesheet" href="./assets/questions.css" />
  </head>
  <body>
    <header>
      <img src="./assets/images/epicode_logo.png" alt="" />
      <div id="language">
        <img
          id="italian-lang"
          src="https://upload.wikimedia.org/wikipedia/commons/0/03/Flag_of_Italy.svg"
          alt="italian"
          style="display: none"
        />
        <img
          id="english-lang"
          src="https://upload.wikimedia.org/wikipedia/en/a/ae/Flag_of_the_United_Kingdom.svg"
          alt="english"
          style="display: none"
        />
      </div>
    </header>
    <main>
       <div class="timer">

       </div>
      <div id="q-a">
        <div id="question">
          <p>question</p>
        </div>
          <div id="answers">
            <div id="blur">
              <button class="answer">Answer1</button>
              <button class="answer">Answer2</button>
              <button class="answer">Answer3</button>
              <button class="answer">Answer4</button>
            </div>
          </div>
        </div>
      </div>
      <div id="bottom-div">
        <p id="questions-left">(questions left)</p>
        <button id="nextQuestion">Next</button>
      </div>
      <div id="customAlert">
          <p id="">Are you sure you want to leave this question unanswered? You won't score any points.</p>
          <button id="skipQuestion">Skip</button>
          <button id="resumeQuestion">Resume</button>
      </div>
    </main>
    <footer></footer>
    <script src="./scripts/questions.js" async defer></script>
    <script src="https://unpkg.com/i18next@latest/i18next.min.js"></script>
  </body>
</html>
